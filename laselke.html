<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two Way - Voice Chat Rooms</title>
    <!-- PeerJS Library -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .pulse-green {
            box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        .hidden { display: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="bg-slate-800 w-full max-w-md rounded-3xl p-8 shadow-2xl border border-slate-700 text-center">
        <!-- Logo Area -->
        <div id="statusIndicator" class="w-24 h-24 bg-black border-8 border-slate-600 rounded-full mx-auto mb-6 flex items-center justify-center text-[10px] font-bold tracking-widest uppercase transition-all duration-500">
            Two Way
        </div>

        <h1 class="text-2xl font-bold mb-2">غرف التواصل الصوتي</h1>
        <p class="text-slate-400 text-sm mb-8">تواصل مع أي شخص في العالم بخصوصية تامة</p>

        <!-- Main Menu -->
        <div id="mainMenu" class="space-y-4">
            <button id="showCreateBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl transition-all active:scale-95 flex items-center justify-center gap-2">
                <span>➕</span> إنشاء غرفة جديدة
            </button>
            <button id="showJoinBtn" class="w-full bg-slate-700 hover:bg-slate-600 text-white font-bold py-4 rounded-2xl transition-all active:scale-95 flex items-center justify-center gap-2">
                <span>🔑</span> انضمام لغرفة موجودة
            </button>
        </div>

        <!-- Create Room UI -->
        <div id="createSection" class="hidden space-y-4">
            <div class="bg-slate-900 p-4 rounded-2xl border border-blue-500/30">
                <p class="text-xs text-slate-500 mb-2">معرف الغرفة الخاص بك (أرسله لصديقك):</p>
                <p id="generatedRoomId" class="text-xl font-mono text-blue-400 font-bold tracking-wider">جاري التوليد...</p>
            </div>
            <p id="createStatus" class="text-sm text-yellow-500 animate-pulse">في انتظار انضمام الطرف الآخر...</p>
            <button onclick="location.reload()" class="text-slate-400 text-sm underline">إلغاء والعودة</button>
        </div>

        <!-- Join Room UI -->
        <div id="joinSection" class="hidden space-y-4">
            <input type="text" id="targetRoomId" placeholder="أدخل معرف الغرفة (ID)" 
                class="w-full bg-slate-900 border border-slate-700 rounded-xl py-4 px-4 text-white text-center focus:outline-none focus:border-green-500 transition-all font-mono">
            <button id="startJoinBtn" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-4 rounded-2xl transition-all active:scale-95">
                بدء الاتصال الآن
            </button>
            <button onclick="location.reload()" class="text-slate-400 text-sm underline">عودة</button>
        </div>

        <!-- Call Active UI -->
        <div id="activeCallSection" class="hidden space-y-6">
            <div class="bg-green-500/10 border border-green-500/50 p-4 rounded-2xl">
                <p id="callMessage" class="text-green-400 font-bold">متصل الآن</p>
            </div>
            <button id="hangupBtn" class="bg-red-500 hover:bg-red-400 w-20 h-20 rounded-full text-white shadow-lg transition-all active:scale-90 flex items-center justify-center mx-auto">
                <span class="text-2xl">📞</span>
            </button>
        </div>

        <audio id="remoteAudio" autoplay></audio>
        
        <div class="mt-8 pt-6 border-t border-slate-700">
            <p class="text-[10px] text-slate-500">مرحباً مروان هاني النجار</p>
            <p class="text-[9px] text-slate-600 mt-1">تأكد من استخدام HTTPS لتفعيل الميكروفون</p>
        </div>
    </div>

    <script>
        let peer = null;
        let localStream = null;
        let currentCall = null;

        const mainMenu = document.getElementById('mainMenu');
        const createSection = document.getElementById('createSection');
        const joinSection = document.getElementById('joinSection');
        const activeCallSection = document.getElementById('activeCallSection');
        
        const generatedRoomIdText = document.getElementById('generatedRoomId');
        const targetRoomIdInput = document.getElementById('targetRoomId');
        const statusIndicator = document.getElementById('statusIndicator');
        const remoteAudio = document.getElementById('remoteAudio');

        // دالة مساعدة لطلب الميكروفون
        async function getMedia() {
            try {
                return await navigator.mediaDevices.getUserMedia({ audio: true });
            } catch (e) {
                alert("يجب السماح بالوصول للميكروفون لبدء المكالمة.");
                return null;
            }
        }

        // --- خيار إنشاء غرفة ---
        document.getElementById('showCreateBtn').onclick = async () => {
            localStream = await getMedia();
            if (!localStream) return;

            mainMenu.classList.add('hidden');
            createSection.classList.remove('hidden');

            // إنشاء معرف عشوائي سهل القراءة
            const randomId = 'room-' + Math.random().toString(36).substr(2, 6);
            peer = new Peer(randomId);

            peer.on('open', (id) => {
                generatedRoomIdText.innerText = id;
            });

            peer.on('call', (call) => {
                currentCall = call;
                call.answer(localStream);
                setupStream(call);
            });
            
            peer.on('error', (err) => {
                alert("حدث خطأ في الشبكة، يرجى المحاولة مرة أخرى.");
                location.reload();
            });
        };

        // --- خيار الانضمام لغرفة ---
        document.getElementById('showJoinBtn').onclick = () => {
            mainMenu.classList.add('hidden');
            joinSection.classList.remove('hidden');
        };

        document.getElementById('startJoinBtn').onclick = async () => {
            const targetId = targetRoomIdInput.value.trim();
            if (!targetId) return alert("من فضلك أدخل المعرف (ID)");

            localStream = await getMedia();
            if (!localStream) return;

            peer = new Peer(); // معرف عشوائي للمنضم
            
            peer.on('open', () => {
                const call = peer.call(targetId, localStream);
                currentCall = call;
                setupStream(call);
            });

            peer.on('error', (err) => {
                alert("لم يتم العثور على الغرفة أو المعرف خطأ.");
            });
        };

        function setupStream(call) {
            call.on('stream', (remoteStream) => {
                remoteAudio.srcObject = remoteStream;
                
                // تحديث الواجهة لحالة الاتصال
                createSection.classList.add('hidden');
                joinSection.classList.add('hidden');
                activeCallSection.classList.remove('hidden');
                
                statusIndicator.classList.add('border-green-500', 'pulse-green');
                statusIndicator.innerText = "LIVE";
            });

            call.on('close', () => {
                alert("انتهت المكالمة");
                location.reload();
            });
        }

        document.getElementById('hangupBtn').onclick = () => {
            location.reload();
        };

    </script>
</body>
</html>
